name: blind_assist_app
description: 启明 - 基于AI视觉、语音交互、智能导航的盲人无障碍辅助应用
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # ===== 核心框架 =====
  flutter_riverpod: ^2.4.0       # 状态管理
  riverpod_annotation: ^2.3.0    # Riverpod代码生成注解
  get_it: ^7.6.0                 # 依赖注入容器
  injectable: ^2.3.0             # DI代码生成
  go_router: ^13.0.0             # 声明式路由
  equatable: ^2.0.5              # 值对象比较
  dartz: ^0.10.1                 # 函数式编程（Either类型，用于错误处理）
  freezed_annotation: ^2.4.1     # 不可变数据类注解

  # ===== 摄像头与传感器 =====
  camera: ^0.10.5                # 摄像头访问
  sensors_plus: ^4.0.0           # 加速度计/陀螺仪/磁力计
  geolocator: ^11.0.0            # GPS定位
  geocoding: ^2.2.0              # 地理编码

  # ===== AI推理 =====
  tflite_flutter: ^0.11.0        # TensorFlow Lite端侧推理（0.10.x 与 Dart 3.x 不兼容）
  google_mlkit_text_recognition: ^0.11.0  # ML Kit OCR
  google_mlkit_image_labeling: ^0.10.0   # ML Kit 图片标签（场景识别）

  # ===== 地图导航 =====
  # TODO: 高德地图插件 v3.0.0 与 AGP 8.0+ 不兼容（缺 namespace）
  # MVP 阶段先移除，导航功能改由 geolocator + HTTP API 直连高德 REST 实现
  # 后续集成真实地图渲染时升级到官方最新 Flutter 插件版本
  # amap_flutter_map: ^3.0.0
  # amap_flutter_location: ^3.0.0

  # ===== 语音交互 =====
  speech_to_text: ^6.6.0         # 语音识别
  flutter_tts: ^3.8.0            # 语音合成

  # ===== 工具库 =====
  permission_handler: ^11.1.0    # 权限管理
  vibration: ^1.8.0              # 震动反馈
  connectivity_plus: ^5.0.0      # 网络状态检测
  hive: ^2.2.3                   # 本地存储
  hive_flutter: ^1.1.0           # Hive Flutter适配
  path_provider: ^2.1.2          # 路径工具
  dio: ^5.4.0                    # HTTP客户端
  logger: ^2.0.2                 # 日志工具
  uuid: ^4.2.1                   # UUID生成
  rxdart: ^0.27.7                # 响应式扩展（事件流处理）
  json_annotation: ^4.8.1        # JSON序列化注解
  intl: ^0.19.0                  # 国际化

  # ===== 无障碍增强 =====
  flutter_accessibility_service: ^0.3.0  # Android无障碍服务桥接

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.8
  riverpod_generator: ^2.3.9
  injectable_generator: ^2.4.1
  freezed: ^2.4.6
  json_serializable: ^6.7.1
  mockito: ^5.4.4
  mocktail: ^1.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/models/
    - assets/sounds/
    - assets/i18n/
    - assets/app_knowledge/
